schema: spec-driven

context: |
  Proyecto: Pruebas de API REST para Demoblaze (signup y login).
  Origen: Prueba Tecnica V4 (Ejercicio 2) - Reto QA Automation (Sofka).

  Objetivo de negocio:
    Validar los servicios REST de autenticacion de https://www.demoblaze.com/ usando Karate DSL.
    Endpoints:
      - POST https://api.demoblaze.com/signup  (registro de usuario)
      - POST https://api.demoblaze.com/login   (autenticacion)
    Casos de prueba:
      1. Signup - crear un usuario nuevo exitosamente.
      2. Signup - intentar crear un usuario ya existente (error esperado).
      3. Login  - credenciales correctas (token de sesion en respuesta).
      4. Login  - credenciales incorrectas (error esperado).

  Stack tecnico:
    - Lenguaje: Java 21
    - Build: Maven via Maven Wrapper (./mvnw)
    - Framework: Karate DSL 1.4.1
    - Runner: JUnit 5 (karate-junit5)
    - Reporte: Karate HTML nativo (target/karate-reports/karate-summary.html)
    - Esquema de datos: inline en feature + shared background

  Convenciones:
    - Paquete base: com.sofka.qa.demoblaze
    - Features en src/test/resources/demoblaze/
    - karate-config.js en src/test/resources/
    - Todos los escenarios tienen tags: @signup, @login, @positivo, @negativo
    - Validar: status code, body de respuesta, headers Content-Type
    - Credentials de prueba: username generado dinamicamente (timestamp) para evitar conflictos

  Criterios de aceptacion:
    - 4 escenarios ejecutan y reportan PASS/FAIL con evidencia.
    - Reporte HTML generado en target/karate-reports/.
    - readme.txt y conclusiones.txt presentes y completos.

rules:
  proposal:
    - Enmarcar en terminos de contrato API (request/response schema).
  tasks:
    - Un escenario Karate = una tarea atomica verificable.
